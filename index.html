<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retro Dungeon Quest</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* CSS Keyframe Animations */
    @keyframes walk {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-8px) rotate(-3deg); }
      50% { transform: translateY(0) rotate(0deg); }
      75% { transform: translateY(-8px) rotate(3deg); }
    }
    .anim-walk { animation: walk 0.4s ease-in-out infinite; }
    
    @keyframes attack-right {
      0% { transform: translateX(0); }
      40% { transform: translateX(50px) scale(1.1) rotate(10deg); }
      100% { transform: translateX(0); }
    }
    .anim-attack-right { animation: attack-right 0.3s ease-in-out; z-index: 30; }
    
    @keyframes attack-left {
      0% { transform: translateX(0); }
      40% { transform: translateX(-50px) scale(1.1) rotate(-10deg); }
      100% { transform: translateX(0); }
    }
    .anim-attack-left { animation: attack-left 0.3s ease-in-out; z-index: 30; }
    
    @keyframes hit {
      0%, 100% { filter: brightness(1) drop-shadow(0 8px 8px rgba(255,255,255,0.15)); transform: translateX(0); }
      25% { filter: brightness(2) sepia(1) hue-rotate(-50deg) saturate(5) drop-shadow(0 0 10px red); transform: translateX(-10px); }
      50% { transform: translateX(10px); }
      75% { transform: translateX(-10px); }
    }
    .anim-hit { animation: hit 0.4s ease-out; }

    @keyframes heal {
      0%, 100% { filter: brightness(1); transform: scale(1); }
      50% { filter: brightness(2) hue-rotate(90deg) saturate(3) drop-shadow(0 0 20px #5bd171); transform: scale(1.1); }
    }
    .anim-heal { animation: heal 0.6s ease-in-out; }

    @keyframes heavy-smash {
      0% { transform: translate(0, 0); }
      30% { transform: translate(-30px, -50px) rotate(-15deg); }
      60% { transform: translate(70px, 15px) rotate(35deg) scale(1.3); }
      100% { transform: translate(0, 0); }
    }
    .anim-heavy-smash { animation: heavy-smash 0.5s ease-in-out; z-index: 30; }

    @keyframes backstab {
      0% { opacity: 1; transform: translateX(0); }
      20% { opacity: 0; transform: translateX(0); filter: drop-shadow(0 0 5px black); }
      50% { opacity: 0; transform: translateX(180px); }
      60% { opacity: 1; transform: translateX(180px) scale(1.2) rotate(20deg); }
      80% { opacity: 1; transform: translateX(180px) scale(1.2) rotate(20deg); }
      100% { opacity: 1; transform: translateX(0); }
    }
    .anim-backstab { animation: backstab 0.5s ease-in-out; z-index: 30; }

    @keyframes venom-strike {
      0% { transform: translateX(0); filter: none; }
      40% { transform: translateX(60px) scale(1.1) rotate(15deg); filter: drop-shadow(0 0 15px #5bd171) hue-rotate(90deg) saturate(4); }
      100% { transform: translateX(0); filter: none; }
    }
    .anim-venom-strike { animation: venom-strike 0.4s ease-in-out; z-index: 30; }

    @keyframes cast-fire {
      0% { transform: scale(1); filter: none; }
      40% { transform: translateX(30px) scale(1.2); filter: drop-shadow(0 0 30px #f23a5c) saturate(4) brightness(1.5); }
      100% { transform: scale(1); filter: none; }
    }
    .anim-cast-fire { animation: cast-fire 0.5s ease-in-out; z-index: 30; }

    @keyframes cast-drain {
      0% { transform: scale(1); filter: none; }
      40% { transform: scale(1.1); filter: drop-shadow(0 0 35px #ba1836) saturate(3) hue-rotate(30deg) brightness(1.2); }
      100% { transform: scale(1); filter: none; }
    }
    .anim-cast-drain { animation: cast-drain 0.5s ease-in-out; z-index: 30; }

    @keyframes cast-magic {
      0% { transform: translateX(0); filter: none; }
      20% { transform: translateX(20px) translateY(-15px); filter: drop-shadow(0 0 15px #cd63f2) brightness(1.5); }
      40% { transform: translateX(30px) translateY(15px); filter: drop-shadow(0 0 20px #457bed) brightness(1.5); }
      60% { transform: translateX(40px) translateY(-10px); filter: drop-shadow(0 0 25px #cd63f2) brightness(1.5); }
      100% { transform: translateX(0); filter: none; }
    }
    .anim-cast-magic { animation: cast-magic 0.5s ease-in-out; z-index: 30; }

    @keyframes smoke-bomb {
      0% { transform: translateX(0) scale(1); filter: drop-shadow(0 0 0px #939ba6); opacity: 1; }
      30% { filter: drop-shadow(0 0 40px #939ba6) brightness(2); }
      100% { transform: translateX(-400px) scale(0.5); filter: drop-shadow(0 0 40px #939ba6); opacity: 0; }
    }
    .anim-smoke-bomb { animation: smoke-bomb 0.6s ease-in forwards; z-index: 30; }

    @keyframes flee {
      0% { transform: translateX(0) scale(1); opacity: 1; }
      100% { transform: translateX(-400px) scale(0.5); opacity: 0; }
    }
    .anim-flee { animation: flee 0.6s ease-in forwards; }

    @keyframes screen-shake {
      0%, 100% { transform: translate(0, 0); }
      20% { transform: translate(-15px, 10px); }
      40% { transform: translate(15px, -10px); }
      60% { transform: translate(-15px, -10px); }
      80% { transform: translate(15px, 10px); }
    }
    .anim-shake { animation: screen-shake 0.3s cubic-bezier(.36,.07,.19,.97) both; }

    @keyframes float-up {
      0% { transform: translate(-50%, 0) scale(0.5); opacity: 0; }
      20% { transform: translate(-50%, -20px) scale(1.2); opacity: 1; }
      100% { transform: translate(-50%, -80px) scale(1); opacity: 0; }
    }
    .anim-float { animation: float-up 1.5s ease-out forwards; }

    @keyframes screen-flash {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }
    .anim-flash { animation: screen-flash 0.5s ease-out forwards; pointer-events: none; }
    
    .anim-bounce-slow { animation: bounce 2s ease-in-out infinite; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

    @keyframes pulse-once {
      0% { opacity: 0.5; color: #fce268; }
      100% { opacity: 1; color: white; }
    }
    .animate-pulse-once { animation: pulse-once 0.4s ease-out; }
    
    /* Scrollbar hiding for cleaner look */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: #fff; border: 1px solid #000; }
  </style>
</head>
<body class="bg-neutral-900 font-mono uppercase text-white font-bold flex justify-center items-center select-none overflow-hidden h-screen w-screen m-0 p-0">

  <!-- Main App Container -->
  <div id="game-container" class="h-screen w-screen overflow-hidden bg-black flex flex-col font-mono text-white select-none relative">
    
    <!-- Screen FX Overlays -->
    <div id="screen-fx"></div>
    <div id="floating-layer" class="absolute top-0 left-0 w-full h-[65%] pointer-events-none z-[100]"></div>
    
    <!-- VISUAL SCREEN (Top Section) -->
    <div id="visual-screen-container" class="flex-1 relative flex justify-center items-end border-b-[4px] border-white bg-slate-900 overflow-hidden">
      <div class="absolute inset-0 pointer-events-none bg-[linear-gradient(transparent_50%,rgba(0,0,0,0.15)_50%)] bg-[length:100%_4px] z-50"></div>
      <div id="visual-screen-bg" class="absolute inset-0 z-0 pointer-events-none" style="image-rendering: pixelated;"></div>
      <div id="visual-screen-content" class="w-full h-full"></div>
    </div>

    <!-- BOTTOM SECTION: Control Panel -->
    <div class="h-[35vh] min-h-[160px] bg-black flex flex-row shrink-0 relative z-50">
      
      <!-- Logs Terminal -->
      <div id="log-terminal" class="w-[45%] md:w-[40%] p-4 border-r-[4px] border-white flex flex-col justify-start overflow-hidden leading-relaxed tracking-wider">
      </div>
      
      <!-- Action Menu -->
      <div id="action-menu" class="w-[55%] md:w-[60%] p-2 sm:p-4 grid grid-cols-2 md:grid-cols-3 gap-2 content-start bg-black shadow-inner overflow-y-auto">
      </div>
      
    </div>
  </div>

const rollDice = (sides) => Math.floor(Math.random() * sides) + 1;
const rollD20 = () => rollDice(20);

const generateMap = () => {
  const width = 50;
  const height = 50;
  let grid = Array(height).fill().map(() => Array(width).fill('#'));
  let px = Math.floor(width / 2);
  let py = Math.floor(height / 2);
  grid[py][px] = '.';

  let walkX = px;
  let walkY = py;
  for (let i = 0; i < 3500; i++) {
    const dir = Math.floor(Math.random() * 4);
    if (dir === 0 && walkY > 1) walkY--;
    if (dir === 1 && walkY < height - 2) walkY++;
    if (dir === 2 && walkX > 1) walkX--;
    if (dir === 3 && walkX < width - 2) walkX++;
    grid[walkY][walkX] = '.';
  }

  const emptyTiles = [];
  for (let y = 0; y < height; y++) {
    for (let x = 0; x < width; x++) {
      if (grid[y][x] === '.' && (x !== px || y !== py)) {
        emptyTiles.push({x, y});
      }
    }
  }

  emptyTiles.sort(() => Math.random() - 0.5);

  const numEnemies = 76;
  const numTreasures = 25;
  const numShops = 4;
  
  for (let i = 0; i < numEnemies; i++) {
    if (emptyTiles.length) {
      const t = emptyTiles.pop();
      grid[t.y][t.x] = 'E';
    }
  }
  for (let i = 0; i < numTreasures; i++) {
    if (emptyTiles.length) {
      const t = emptyTiles.pop();
      grid[t.y][t.x] = 'T';
    }
  }
  for (let i = 0; i < numShops; i++) {
    if (emptyTiles.length) {
      const t = emptyTiles.pop();
      grid[t.y][t.x] = 'S';
    }
  }
  if (emptyTiles.length) {
    const t = emptyTiles.pop();
    grid[t.y][t.x] = '>'; // Portal deeper
  }

  return { grid, startX: px, startY: py, width, height };
};

const revealRadius = (currentMap, px, py) => {
  if (!currentMap || currentMap.length === 0) return currentMap;
  let newMap = currentMap.map(row => [...row]);
  for (let dy = -3; dy <= 3; dy++) {
    for (let dx = -3; dx <= 3; dx++) {
      const ny = py + dy;
      const nx = px + dx;
      if (ny >= 0 && ny < currentMap.length && nx >= 0 && nx < currentMap[0].length) {
        if (Math.abs(dx) + Math.abs(dy) <= 3) {
            newMap[ny][nx] = true;
        }
      }
    }
  }
  return newMap;
};

function getPixelArtHTML(art, scale = 4, className = "") {
  if (!art) return '';
  let rects = '';
  art.forEach((row, y) => {
    row.split('').forEach((char, x) => {
      if (char !== '.') {
        rects += `<rect x="${x}" y="${y}" width="1.05" height="1.05" fill="${PALETTE[char]}" />`;
      }
    });
  });
  return `<svg viewBox="0 0 32 32" width="${32 * scale}" height="${32 * scale}" shape-rendering="crispEdges" class="drop-shadow-[0_8px_8px_rgba(255,255,255,0.15)] filter ${className}">${rects}</svg>`;
}

function getStatBarHTML(label, current, max, colorClass) {
  const percent = Math.max(0, Math.min(100, (current / max) * 100));

}

              ${getPixelArtHTML(SPRITE_DATA[state.enemy.spriteKey], 5.5)}
            </div>
          </div>
          <div class="mt-4 w-48 bg-black p-2 border-[2px] border-white relative z-40 shadow-lg">
            <div class="text-sm text-[#f23a5c]">${state.enemy.name}</div>
            ${getStatBarHTML("HP", state.enemy.hp, state.enemy.maxHp, "bg-[#f23a5c]")}
          </div>
        </div>`;
    }
    html += `</div>`;
  } 
  
  else if (state.gameState === 'SHOP') {
    let hasCharismaFocus = (state.player.cha || 0) > (state.player.wis || 0) && (state.player.cha || 0) > (state.player.int || 0) && (state.player.cha || 0) > (state.player.str || 0) && (state.player.cha || 0) > (state.player.dex || 0);
    let discount = hasCharismaFocus ? Math.max(0, (state.player.cha || 0) * 2) : 0;
    let discountText = discount > 0 ? `<div class="text-[#5bd171] text-xs mb-2">CHA DISCOUNT: -${discount}G</div>` : "";

    html += `
      <div class="absolute inset-0 flex flex-col items-center justify-center pt-8 z-10 bg-black/80">
        <h2 class="text-5xl text-[#fce268] mb-8" style="text-shadow: 3px 3px 0 #000">MERCHANT</h2>
        <div class="flex gap-8">
          <div class="text-center text-white bg-black p-4 border-2 border-[#fce268]">
            <div class="text-[#fce268] mb-2">YOUR GOLD: ${state.player.gold}</div>
            ${discountText}
            ${getPixelArtHTML(SPRITE_DATA.Merchant, 4, "mx-auto")}
          </div>
        </div>
      </div>`;
  } 
  
  else if (state.gameState === 'GAMEOVER') {
    html += `
      <div class="absolute inset-0 flex flex-col items-center justify-center z-10 bg-red-950/80">
        <h1 class="text-6xl text-white mb-8 tracking-widest text-center" style="text-shadow: 4px 4px 0 #000">YOU DIED</h1>
        <div class="anim-bounce-slow">
          ${getPixelArtHTML(SPRITE_DATA.Skull, 7)}
        </div>
      </div>`;
  }

  container.innerHTML = html;
}

function renderActions() {
  const menu = document.getElementById('action-menu');
  let html = '';
  const anim = state.isAnimating;

  if (state.gameState === 'MENU') {
    html += `<div class="col-span-full">${getMenuButtonHTML('startGame()', 'START GAME', anim)}</div>`;
  } 
  else if (state.gameState === 'CREATE') {
    html += `<div class="col-span-full text-center text-[#5bd171] mt-2 animate-pulse text-xs sm:text-sm">CLICK ON A HERO ABOVE TO CHOOSE THEM!</div>`;
  } 
  else if (state.gameState === 'EXPLORE') {
    html += getMenuButtonHTML('usePotion()', `HP POT (${state.player.potions})`, anim || state.player.potions <= 0);
    html += getMenuButtonHTML('useManaPotion()', `MP POT (${state.player.manaPotions})`, anim || state.player.manaPotions <= 0);
    html += getMenuButtonHTML('checkStats()', 'STATS', anim);
    html += getMenuButtonHTML('openPortalMenu()', 'PORTAL', anim);
    html += getMenuButtonHTML('openShop()', 'SHOP', anim);
  } 
  else if (state.gameState === 'PORTAL_MENU') {
    ['EARTH', 'FIRE', 'ICE', 'AIR', 'PLANT', 'SLIME', 'POISON', 'ACID', 'WATER'].forEach(b => {
      html += getMenuButtonHTML(`travelToBiome('${b}')`, `TO ${b}`, anim || state.currentBiome === b);
    });
    html += getMenuButtonHTML(`leavePortal()`, 'CANCEL', anim);
  }
  else if (state.gameState === 'SHOP') {
    let hasCharismaFocus = (state.player.cha || 0) > (state.player.wis || 0) && (state.player.cha || 0) > (state.player.int || 0) && (state.player.cha || 0) > (state.player.str || 0) && (state.player.cha || 0) > (state.player.dex || 0);
    let chaDiscount = hasCharismaFocus ? Math.max(0, (state.player.cha || 0) * 2) : 0;
    let hpPrice = Math.max(5, 20 - chaDiscount);
    let mpPrice = Math.max(5, 25 - chaDiscount);
    let upgPrice = Math.max(10, 50 - (chaDiscount * 2));

    html += getMenuButtonHTML(`buyItem('hp', ${hpPrice})`, `HP POT (${hpPrice}G)`, anim || state.player.gold < hpPrice);
    html += getMenuButtonHTML(`buyItem('mp', ${mpPrice})`, `MP POT (${mpPrice}G)`, anim || state.player.gold < mpPrice);
    html += getMenuButtonHTML(`buyItem('offense', ${upgPrice})`, `+DMG (${upgPrice}G)`, anim || state.player.gold < upgPrice);
    html += getMenuButtonHTML(`buyItem('defense', ${upgPrice})`, `+DEF (${upgPrice}G)`, anim || state.player.gold < upgPrice);
    html += getMenuButtonHTML(`leaveShop()`, 'LEAVE SHOP', anim);
  } 
  else if (state.gameState === 'COMBAT') {
    html += getMenuButtonHTML('attack()', 'ATTACK', anim);
    const skills = SKILLS[state.player.charClass] || [];
    skills.forEach((skill, index) => {
      html += getMenuButtonHTML(`useSkill(${index})`, `${skill.name} (${skill.cost}MP)`, anim || state.player.mp < skill.cost);
    });
    html += getMenuButtonHTML('usePotion()', `HP POT (${state.player.potions})`, anim || state.player.potions <= 0);
    html += getMenuButtonHTML('useManaPotion()', `MP POT (${state.player.manaPotions})`, anim || state.player.manaPotions <= 0);
    html += getMenuButtonHTML('flee()', 'FLEE', anim);
  } 
  else if (state.gameState === 'GAMEOVER') {
    html += `<div class="col-span-full">${getMenuButtonHTML('restartGame()', 'RETURN TO MENU', anim)}</div>`;
  }

  menu.innerHTML = html;
}

function renderLogs() {
  const term = document.getElementById('log-terminal');
  let html = state.logs.map(log => `<div class="animate-pulse-once mb-[2px] opacity-90 text-sm">${log.msg}</div>`).join('');
  term.innerHTML = html;
}

// --- GAME LOGIC FUNCTIONS ---
function addLog(msg) {
  state.logs.unshift({ id: Date.now() + Math.random(), msg });
  if (state.logs.length > 4) {
    state.logs = state.logs.slice(0, 4);
  }
  renderLogs();
}

function clearLogs() {
  state.logs = [];
  renderLogs();
}

function spawnFloatingText(pos, text, color) {
  const layer = document.getElementById('floating-layer');
  if (!layer) return;

  const el = document.createElement('div');
  let leftPos = pos === 'player' ? '25%' : pos === 'enemy' ? '75%' : '50%';
  el.className = 'absolute text-2xl font-bold anim-float';
  el.style.color = color;
  el.style.left = leftPos;
  el.style.bottom = '40%';
  el.style.textShadow = '2px 2px 0 #000';
  el.innerText = text;

  layer.appendChild(el);

  setTimeout(() => {
    if (el.parentNode) el.parentNode.removeChild(el);
  }, 1500);
}

function getAttackModifier() {
  const cls = state.player.charClass;
  if (['Fighter', 'Dwarf', 'Earth Element'].includes(cls)) return state.player.str;
  if (['Rogue', 'Elf', 'Air Element'].includes(cls)) return state.player.dex;
  if (['Mage', 'Fire Element', 'Water Element'].includes(cls)) return state.player.int;
  if (['Plant Element', 'Ice Element'].includes(cls)) return state.player.wis;
  if (['Satyr'].includes(cls)) return state.player.cha;
  return state.player.int;
}

function checkLevelUp(currentXp, currentLevel) {
  const xpNeeded = currentLevel * 100;
  if (currentXp >= xpNeeded) {
    state.player.level += 1;
    state.player.xp -= xpNeeded;
    state.player.maxHp += 5;
    state.player.hp = state.player.maxHp;
    state.player.maxMp += 2;
    state.player.mp = state.player.maxMp;
    const cls = state.player.charClass;
    state.player.str += (['Fighter', 'Dwarf', 'Earth Element'].includes(cls) ? 1 : 0);
    state.player.dex += (['Rogue', 'Elf', 'Air Element'].includes(cls) ? 1 : 0);
    state.player.int += (['Mage', 'Fire Element', 'Water Element'].includes(cls) ? 1 : 0);
    state.player.wis += (['Plant Element', 'Ice Element', 'Water Element'].includes(cls) ? 1 : 0);
    state.player.cha += (['Satyr', 'Elf'].includes(cls) ? 1 : 0);
    
    addLog(`HERO GREW TO LV ${state.player.level}!`);
    spawnFloatingText('player', 'LEVEL UP!', '#fce268');
  }
}

// --- GLOBALLY EXPOSED ACTIONS ---
window.startGame = function() {
  clearLogs();
  state.gameState = 'CREATE';
  render();
};

window.createCharacter = function(charClass) {
  const stats = CLASSES[charClass];
  state.player = {
    name: 'HERO', charClass, level: 1, xp: 0,
    maxHp: stats.hp, hp: stats.hp, maxMp: stats.mp, mp: stats.mp, 
    str: stats.str || 0, dex: stats.dex || 0, int: stats.int || 0, wis: stats.wis || 0, cha: stats.cha || 0, 
    potions: 3, manaPotions: 1, gold: 0, defenseBonus: 0
  };
  state.currentBiome = 'EARTH'; 
  state.corrodeDamage = 0;
  
  const mapData = generateMap();
  state.dungeonMap = mapData.grid;
  state.playerPos = { x: mapData.startX, y: mapData.startY };
  
  const emptyFog = [];
  for(let i=0; i<mapData.height; i++) emptyFog.push(new Array(mapData.width).fill(false));
  state.exploredMap = revealRadius(emptyFog, mapData.startX, mapData.startY);
  
  clearLogs();
  addLog(`${charClass.toUpperCase()} WAS CHOSEN!`);
  addLog(`ENTER THE DUNGEON... (USE W,A,S,D TO EXPLORE)`);
  state.gameState = 'EXPLORE';
  render();
};

window.travelToBiome = function(biome) {
  state.currentBiome = biome;

  const mapData = generateMap();
  state.dungeonMap = mapData.grid;
  state.playerPos = { x: mapData.startX, y: mapData.startY };
  
  const emptyFog = [];
  for(let i=0; i<mapData.height; i++) emptyFog.push(new Array(mapData.width).fill(false));
  state.exploredMap = revealRadius(emptyFog, mapData.startX, mapData.startY);
  
  clearLogs();
  addLog(`YOU ENTERED THE ${biome} BIOME...`);

};

window.openPortalMenu = function() {

  render();
};

window.leavePortal = function() {
  clearLogs();
  state.gameState = 'EXPLORE';
  render();
}

window.openShop = function() {
  clearLogs();
  addLog("WELCOME TO THE SHOP!");
  state.gameState = 'SHOP';
  render();
}

window.leaveShop = function() {

window.checkStats = function() {
  clearLogs();
  addLog(`GOLD: ${state.player.gold} | HP POTS: ${state.player.potions} | MP POTS: ${state.player.manaPotions}`);
  addLog(`HP: ${state.player.hp}/${state.player.maxHp} | MP: ${state.player.mp}/${state.player.maxMp}`);
  addLog(`STR:${state.player.str} DEX:${state.player.dex} INT:${state.player.int} WIS:${state.player.wis} CHA:${state.player.cha}`);
  let specialChance = Math.max(5, 30 - ((state.player.wis || 0) * 5));
  let dodgeChance = Math.max(0, (state.player.dex || 0) * 5);
  addLog(`DODGE: ${dodgeChance}% | ENEMY SPCL: ${specialChance}%`);
  if (state.corrodeDamage > 0) addLog(`STATUS: CORRODING (${state.corrodeDamage} DMG/TURN)`);
  addLog(`DMG MOD: +${getAttackModifier()} | DEF: ${state.player.defenseBonus} | EXP: ${state.player.xp}/${state.player.level * 100}`);
};

window.buyItem = function(type, cost) {
  if (state.player.gold < cost) {
    addLog("NOT ENOUGH GOLD!");
    spawnFloatingText('center', `NEED ${cost}G`, '#f23a5c');
    return;
  }
  state.player.gold -= cost;
  if (type === 'hp') {
    state.player.potions += 1;
    addLog("BOUGHT HP POTION!");
    spawnFloatingText('center', `-20G`, '#fce268');
  } else if (type === 'mp') {
    state.player.manaPotions += 1;
    addLog("BOUGHT MANA POTION!");
    spawnFloatingText('center', `-25G`, '#fce268');
  } else if (type === 'offense') {
    const cls = state.player.charClass;
    if (['Fighter', 'Dwarf', 'Earth Element'].includes(cls)) state.player.str += 1;
    if (['Rogue', 'Elf', 'Air Element'].includes(cls)) state.player.dex += 1;
    if (['Mage', 'Fire Element', 'Water Element'].includes(cls)) state.player.int += 1;
    if (['Plant Element', 'Ice Element'].includes(cls)) state.player.wis += 1;
    if (['Satyr'].includes(cls)) state.player.cha += 1;
    addLog("WEAPON UPGRADED! (+DMG)");
    spawnFloatingText('center', `-50G`, '#fce268');
  } else if (type === 'defense') {
    state.player.defenseBonus += 1;
    addLog("ARMOR UPGRADED! (-DMG TAKEN)");
    spawnFloatingText('center', `-50G`, '#fce268');
  }
  render();
};

window.handleMove = function(dx, dy) {
  if (state.gameState !== 'EXPLORE' || state.isAnimating) return;
  
  const nx = state.playerPos.x + dx;
  const ny = state.playerPos.y + dy;
  if (nx < 0 || ny < 0 || ny >= state.dungeonMap.length || nx >= state.dungeonMap[0].length) return;
  
  const tile = state.dungeonMap[ny][nx];
  if (tile === '#') return;
  
  state.playerPos = { x: nx, y: ny };
  state.exploredMap = revealRadius(state.exploredMap, nx, ny);
  
  let newMap = state.dungeonMap.map(row => [...row]);

  if (tile === 'E') {
     newMap[ny][nx] = '.';
     state.dungeonMap = newMap;
     state.corrodeDamage = 0; 
     
     let baseEnemy = null;
     if (Math.random() < 0.35) {
       if (state.currentBiome === 'FIRE') baseEnemy = ENEMIES.find(e => e.name === 'EVIL FIRE ELEMENT');
       else if (state.currentBiome === 'ICE') baseEnemy = ENEMIES.find(e => e.name === 'EVIL ICE ELEMENT');
       else if (state.currentBiome === 'EARTH') baseEnemy = ENEMIES.find(e => e.name === 'EVIL EARTH ELEMENT');
       else if (state.currentBiome === 'AIR') baseEnemy = ENEMIES.find(e => e.name === 'EVIL AIR ELEMENT');
       else if (state.currentBiome === 'PLANT') baseEnemy = ENEMIES.find(e => e.name === 'EVIL PLANT ELEMENT');
       else if (state.currentBiome === 'SLIME') baseEnemy = ENEMIES.find(e => e.name === 'SLIME');
       else if (state.currentBiome === 'POISON') baseEnemy = ENEMIES.find(e => e.name === 'EVIL POISON ELEMENT');
       else if (state.currentBiome === 'ACID') baseEnemy = ENEMIES.find(e => e.name === 'EVIL ACID ELEMENT');
       else if (state.currentBiome === 'WATER') baseEnemy = ENEMIES.find(e => e.name === 'EVIL WATER ELEMENT');
     }
     
     if (!baseEnemy) {
       baseEnemy = ENEMIES[Math.floor(Math.random() * ENEMIES.length)];
     }
     
     state.enemy = {
       ...baseEnemy,
       maxHp: baseEnemy.hp + (state.player.level * 2), hp: baseEnemy.hp + (state.player.level * 2),
       ac: baseEnemy.ac + Math.floor(state.player.level / 2), atk: baseEnemy.atk + Math.floor(state.player.level / 2),
       usedSpecial: false
     };
     state.screenFX = 'flash';
     state.isAnimating = true;
     render();
     addLog(`WILD ${state.enemy.name} APPEARED!`);
     setTimeout(() => {
       state.gameState = 'COMBAT';
       state.screenFX = null;
       state.isAnimating = false;
       render();
     }, 500);
  } else if (tile === 'T') {
     newMap[ny][nx] = '.';
     state.dungeonMap = newMap;
     const foundGold = rollDice(10) + (state.player.level * 5);
     const foundPotion = rollDice(10) > 7;
     state.player.gold += foundGold;
     if (foundPotion) state.player.potions += 1;
     
     spawnFloatingText('center', `+${foundGold} GOLD`, '#fce268');
     addLog(`FOUND ${foundGold} GOLD!`);
     if (foundPotion) {
        setTimeout(() => spawnFloatingText('center', `+1 POTION`, '#5bd171'), 500);
        addLog(`FOUND A POTION!`);
     }
     render();
  } else if (tile === 'S') {
     addLog("YOU ENTER THE MERCHANT OUTPOST.");
     state.gameState = 'SHOP';
     render();
  } else if (tile === '>') {
     addLog("YOU DESCEND DEEPER...");
     const nextFloor = generateMap();
     state.dungeonMap = nextFloor.grid;
     state.playerPos = { x: nextFloor.startX, y: nextFloor.startY };
     const emptyFog = [];
     for(let i=0; i<nextFloor.height; i++) emptyFog.push(new Array(nextFloor.width).fill(false));
     state.exploredMap = revealRadius(emptyFog, nextFloor.startX, nextFloor.startY);
     render();
  } else {
     render();
  }
};

function doEnemyTurn(currentHp, currentEnemyObj) {
  setTimeout(() => {
    state.enemyAnim = 'attack-left';
    render();
    
    setTimeout(() => {
      state.enemyAnim = null;
      const activeEnemy = currentEnemyObj || state.enemy;
      let pNewHp = currentHp;
      let eNewHp = activeEnemy.hp;
      let eHit = false;
      let eDmg = 0;
      let isSpecial = false;

      let specialChance = Math.max(0.05, 0.30 - ((state.player.wis || 0) * 0.05));
      let dodgeChance = Math.max(0, (state.player.dex || 0) * 0.05);
      let pDodge = Math.random() < dodgeChance;

      if (!activeEnemy.usedSpecial && Math.random() <= specialChance) {
        isSpecial = true;
        activeEnemy.usedSpecial = true;
        addLog(`${activeEnemy.name} USES ${activeEnemy.special.name}!`);

        if (activeEnemy.special.type === 'damage' || activeEnemy.special.type === 'drain') {
          if (pDodge) {
            addLog(`HERO DODGED IT!`);
          } else {
            eDmg = Math.max(1, activeEnemy.special.val - (state.player.defenseBonus || 0));
            eHit = true;
            addLog(`IT HITS FOR ${eDmg} DMG!`);
            if (activeEnemy.special.type === 'drain') {
              const healAmt = Math.max(1, Math.floor(eDmg / 2));
              eNewHp = Math.min(activeEnemy.maxHp, activeEnemy.hp + healAmt);
              setTimeout(() => spawnFloatingText('enemy', `+${healAmt} HP`, '#5bd171'), 400);
            }
          }
        } else if (activeEnemy.special.type === 'heal') {
          const healAmt = activeEnemy.special.val;
          eNewHp = Math.min(activeEnemy.maxHp, activeEnemy.hp + healAmt);
          addLog(`IT RECOVERS ${healAmt} HP!`);
          spawnFloatingText('enemy', `+${healAmt} HP`, '#5bd171');
        } else if (activeEnemy.special.type === 'buffAC') {
          activeEnemy.ac += activeEnemy.special.val;
          addLog(`ITS DEFENSE INCREASES!`);
          spawnFloatingText('enemy', `+DEF`, '#457bed');
        } else if (activeEnemy.special.type === 'buffATK') {
          activeEnemy.atk += activeEnemy.special.val;
          activeEnemy.dmg += 2;
          addLog(`ITS POWER INCREASES!`);
          spawnFloatingText('enemy', `+ATK`, '#f23a5c');
        } else if (activeEnemy.special.type === 'corrode') {
          if (pDodge) {
            addLog(`HERO DODGED THE ACID!`);
          } else {
            state.corrodeDamage += (activeEnemy.special.val || 0);
            eDmg = activeEnemy.special.initialDmg || 0;
            eHit = true;
            addLog(`COVERED IN ACID! (${state.corrodeDamage} DMG/TURN)`);
          }
        }
      } else {
        const eRoll = rollD20();
        if (pDodge) {
          addLog(`HERO MOVED FAST & DODGED!`);
        } else if (eRoll === 20) {
          eDmg = Math.max(1, rollDice(activeEnemy.dmg) + rollDice(activeEnemy.dmg) - (state.player.defenseBonus || 0));
          eHit = true;
          addLog(`ENEMY CRIT! ${eDmg} DMG!`);
        } else if (Math.random() >= 0.10) { 
          eDmg = Math.max(1, rollDice(activeEnemy.dmg) - (state.player.defenseBonus || 0));
          eHit = true;
          addLog(`${activeEnemy.name} HIT FOR ${eDmg} DMG.`);
        } else {
          addLog(`${activeEnemy.name} MISSED!`);
        }
      }

      if (eHit) {
        const isOneShot = Math.random() < 0.005;
        if (isOneShot) {
          eDmg = pNewHp;
          addLog(`FATAL STRIKE! HERO ONE-SHOTTED!`);
        }
        pNewHp -= eDmg;

        state.playerAnim = 'hit';
        state.screenFX = 'shake';
        spawnFloatingText('player', isOneShot ? 'INSTAKILL' : `-${eDmg}`, '#f23a5c');
      } else if (!isSpecial || activeEnemy.special.type === 'damage' || activeEnemy.special.type === 'drain' || activeEnemy.special.type === 'corrode') {
        spawnFloatingText('player', pDodge ? `DODGE` : `MISS`, '#d8e1eb');
      }

      if (state.corrodeDamage > 0 && pNewHp > 0) {
         pNewHp -= state.corrodeDamage;
         addLog(`ACID CORRODES FOR ${state.corrodeDamage} DMG!`);
         setTimeout(() => spawnFloatingText('player', `-${state.corrodeDamage}`, '#a2eb73'), 200);
      }

      render();

      setTimeout(() => {
        state.playerAnim = null;
        state.screenFX = null;
        state.player.hp = pNewHp;
        
        state.enemy.hp = eNewHp;
        state.enemy.usedSpecial = activeEnemy.usedSpecial;
        state.enemy.ac = activeEnemy.ac;
        state.enemy.atk = activeEnemy.atk;
        state.enemy.dmg = activeEnemy.dmg;
        
        if (pNewHp <= 0) {
          addLog(`HERO HAS FALLEN!`);
          setTimeout(() => { 
            state.gameState = 'GAMEOVER'; 
            state.isAnimating = false; 
            render(); 
          }, 1500);
        } else {
          state.isAnimating = false;
        }
        render();
      }, 400); 
    }, 300); 
  }, 500); 
}

window.attack = function() {
  state.isAnimating = true;
  clearLogs();
  state.playerAnim = 'attack-right';
  
  render();
  
  setTimeout(() => {
    state.playerAnim = null;
    const pRoll = rollD20();
    const pMod = getAttackModifier();
    let eNewHp = state.enemy.hp;
    let hit = false;
    let dmg = 0;

    if (pRoll === 20) {
      dmg = rollDice(8) + rollDice(8) + pMod;
      hit = true;
      addLog(`CRITICAL HIT! ${dmg} DMG!`);
    } else if (Math.random() >= 0.10) {
      dmg = Math.max(1, rollDice(8) + pMod);
      hit = true;
      addLog(`HERO HIT FOR ${dmg} DMG.`);
    } else {
      addLog(`HERO MISSED!`);
    }

    if (hit) {
      const isOneShot = Math.random() < 0.005;
      if (isOneShot) {
        dmg = eNewHp;
        addLog(`FATAL STRIKE! ONE-SHOT KILL!`);
      }
      eNewHp -= dmg;

      state.enemyAnim = 'hit';
      state.screenFX = 'shake';
      spawnFloatingText('enemy', isOneShot ? 'INSTAKILL' : `-${dmg}`, '#f23a5c');
    } else {
      spawnFloatingText('enemy', `MISS`, '#d8e1eb');
    }
    render();

    setTimeout(() => {
      state.enemyAnim = null;
      state.screenFX = null;

      if (eNewHp <= 0) {
        addLog(`${state.enemy.name} DEFEATED!`);
        spawnFloatingText('center', `+${state.enemy.xp} EXP`, '#5bd171');
        const newXp = state.player.xp + state.enemy.xp;
        state.player.xp = newXp;
        state.player.mp = Math.min(state.player.maxMp, state.player.mp + 2);
        state.corrodeDamage = 0; 
        checkLevelUp(newXp, state.player.level);
        render();
        
        setTimeout(() => {
           state.enemy = null;
           state.gameState = 'EXPLORE';
           state.isAnimating = false;
           render();
        }, 1500);
        return;
      }

      state.enemy.hp = eNewHp;
      render();
      doEnemyTurn(state.player.hp, state.enemy);
    }, 400); 
  }, 300); 
};

window.useSkill = function(index) {
  const skill = SKILLS[state.player.charClass][index];
  if (state.player.mp < skill.cost) {
    addLog(`NOT ENOUGH MP!`);
    return;
  }
  state.isAnimating = true;
  clearLogs();
  const animTime = skill.animTime || 300;
  
  if (skill.type === 'flee') {
      state.playerAnim = skill.animId;
      state.player.mp -= skill.cost;
      addLog(`USED ${skill.name}!`);
      addLog(`ESCAPED SUCCESSFULLY!`);
      render();
      setTimeout(() => {
         state.playerAnim = null;
         state.enemy = null;
         state.corrodeDamage = 0; 
         state.gameState = 'EXPLORE';
         state.isAnimating = false;
         render();
      }, animTime);
      return;
  }

  state.playerAnim = skill.animId;
  state.player.mp -= skill.cost;
  render();

  setTimeout(() => {
    state.playerAnim = null;
    let eNewHp = state.enemy.hp;
    let pNewHp = state.player.hp;
    let hit = false;
    let dmg = 0;
    let healed = 0;
    let isOneShot = false;
    const pMod = getAttackModifier();

    if (skill.type === 'heal') {
       healed = state.player.level;
       for(let i=0; i<skill.healCount; i++) healed += rollDice(skill.healDice);
       pNewHp = Math.min(state.player.maxHp, state.player.hp + healed);
       spawnFloatingText('player', `+${healed} HP`, '#5bd171');
       addLog(`USED ${skill.name}! RESTORED ${healed} HP.`);
       hit = true;
    } else {
       let roll = rollD20();
       if (skill.type === 'surehit' || roll === 20 || Math.random() >= 0.10) {
          hit = true;
          for(let i=0; i<skill.dmgCount; i++) dmg += rollDice(skill.dmgDice);
          dmg += pMod;
          if (skill.bonus) dmg += skill.bonus;
          if (roll === 20 && skill.type !== 'surehit') dmg += rollDice(skill.dmgDice);
          dmg = Math.max(1, dmg);

          isOneShot = Math.random() < 0.005;
          if (isOneShot) {
            dmg = eNewHp;
            addLog(`USED ${skill.name}! FATAL ONE-SHOT!`);
          } else {
            addLog(`USED ${skill.name}! ${dmg} DMG!`);
          }
          eNewHp -= dmg;

          if (skill.type === 'drain') {
             healed = Math.max(1, Math.floor(dmg / 2));
             pNewHp = Math.min(state.player.maxHp, state.player.hp + healed);
             setTimeout(() => spawnFloatingText('player', `+${healed} HP`, '#5bd171'), 400);
          }
       } else {
          addLog(`USED ${skill.name} AND MISSED!`);
       }
    }

    if (hit && skill.type !== 'heal') {
      state.enemyAnim = 'hit';
      state.screenFX = 'shake';
      spawnFloatingText('enemy', isOneShot ? 'INSTAKILL' : `-${dmg}`, '#f23a5c');
    } else if (!hit && skill.type !== 'heal') {
      spawnFloatingText('enemy', `MISS`, '#d8e1eb');
    }
    
    state.player.hp = pNewHp;
    render();

    setTimeout(() => {
      state.enemyAnim = null;
      state.screenFX = null;

      if (eNewHp <= 0) {
        addLog(`${state.enemy.name} DEFEATED!`);
        spawnFloatingText('center', `+${state.enemy.xp} EXP`, '#5bd171');
        const newXp = state.player.xp + state.enemy.xp;
        state.player.xp = newXp;
        state.player.mp = Math.min(state.player.maxMp, state.player.mp + 2);
        state.corrodeDamage = 0; 
        checkLevelUp(newXp, state.player.level);
        render();
        
        setTimeout(() => {
           state.enemy = null;
           state.gameState = 'EXPLORE';
           state.isAnimating = false;
           render();
        }, 1500);
        return;
      }

      state.enemy.hp = eNewHp;
      render();
      doEnemyTurn(pNewHp, state.enemy);
    }, 400);
  }, 300);
};

window.usePotion = function() {
  if (state.player.potions <= 0) return;
  state.isAnimating = true;
  clearLogs();
  
  const heal = 15; 
  state.playerAnim = 'heal';
  spawnFloatingText('player', `+${heal} HP`, '#5bd171');
  addLog(`USED POTION! RESTORED ${heal} HP.`);
  
  state.player.hp = Math.min(state.player.maxHp, state.player.hp + heal);
  state.player.potions -= 1;
  render();
  
  setTimeout(() => {
    state.playerAnim = null;
    if (state.gameState === 'COMBAT') {
       doEnemyTurn(state.player.hp, state.enemy);
    } else {
       state.isAnimating = false;
       render();
    }
  }, 800);
};

window.useManaPotion = function() {
  if (state.player.manaPotions <= 0) return;
  state.isAnimating = true;
  clearLogs();
  
  const restore = rollDice(6) + 4;
  state.playerAnim = 'heal';
  spawnFloatingText('player', `+${restore} MP`, '#457bed');
  addLog(`USED MP POTION! RESTORED ${restore} MP.`);
  
  state.player.mp = Math.min(state.player.maxMp, state.player.mp + restore);
  state.player.manaPotions -= 1;
  render();
  
  setTimeout(() => {
    state.playerAnim = null;
    if (state.gameState === 'COMBAT') {
       doEnemyTurn(state.player.hp, state.enemy);
    } else {
       state.isAnimating = false;
       render();
    }
  }, 800);
};

window.flee = function() {
  state.isAnimating = true;
  clearLogs();
  const chance = Math.random();
  
  if (chance < 0.50 + ((state.player.dex || 0) * 0.10)) {
    state.playerAnim = 'flee';
    addLog(`MOVED FAST! GOT AWAY SAFELY!`);
    render();
    setTimeout(() => {
       state.playerAnim = null;
       state.enemy = null;
       state.corrodeDamage = 0; 
       state.gameState = 'EXPLORE';
       state.isAnimating = false;
       render();
    }, 800);
  } else {
    addLog(`COULDN'T ESCAPE!`);
    render();
    doEnemyTurn(state.player.hp, state.enemy);
  }
};

window.restartGame = function() {
  state.gameState = 'MENU';
  clearLogs();
  render();
};

// --- KEYBOARD LISTENERS ---
window.addEventListener('keydown', (e) => {
   const key = e.key.toLowerCase();
   
   if (['arrowup', 'arrowdown', 'arrowleft', 'arrowright', ' '].includes(key)) {
     e.preventDefault();
   }

   if (state.gameState !== 'EXPLORE' || state.isAnimating) return;

   if (key === 'w' || key === 'arrowup') window.handleMove(0, -1);
   if (key === 's' || key === 'arrowdown') window.handleMove(0, 1);
   if (key === 'a' || key === 'arrowleft') window.handleMove(-1, 0);
   if (key === 'd' || key === 'arrowright') window.handleMove(1, 0);
});

// INITIAL RENDER
render();

</script>
</body>
